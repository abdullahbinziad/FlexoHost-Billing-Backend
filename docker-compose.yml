services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command:
      [
        "mongod",
        "--replSet", "rs0",
        "--bind_ip_all",
        "--port", "27017",
        "--keyFile", "/etc/mongo-keyfile/keyfile"
      ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: YOUR_STRONG_PASSWORD
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
    ports:
      - "27017:27017"

volumes:
  mongo_data:
  mongo_config: